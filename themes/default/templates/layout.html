<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} — {{ site_title }}</title>
    {% if enable_seo %}
    <meta name="description" content="{{ meta_description }}">
    <meta property="og:title" content="{{ og_title }}">
    <meta property="og:description" content="{{ og_description }}">
    <meta property="og:type" content="{{ og_type }}">
    <meta property="og:url" content="{{ og_url }}">
    <meta property="og:site_name" content="{{ site_title }}">
    <meta name="twitter:card" content="{{ twitter_card }}">
    <meta name="twitter:title" content="{{ twitter_title }}">
    <meta name="twitter:description" content="{{ twitter_description }}">
    {% endif %}
    <link rel="stylesheet" href="{{ base_url }}/assets/css/style.css">
    <link rel="alternate" type="application/rss+xml" title="{{ site_title }}" href="{{ base_url }}/rss.xml">
</head>
<body>
    <header>
        <nav>
            <a href="{{ base_url }}/" class="site-name">{{ site_title }}</a>
            <div class="nav-links">
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/archive.html">Archive</a>
                <a href="{{ base_url }}/tags.html">Tags</a>
                <a href="{{ base_url }}/rss.xml">RSS</a>
            </div>
        </nav>
    </header>
    <main>
        {{{ content }}}
    </main>
    <footer>
        <p>&copy; {{ year }} {{ author }}. Powered by <a href="https://github.com/termplay/cblog">cblog</a>.</p>
    </footer>
    <script src="{{ base_url }}/assets/js/main.js"></script>
</body>
</html>
