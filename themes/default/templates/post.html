<article class="post">
    <header class="post-header">
        <h1>{{ title }}</h1>
        <div class="post-meta">
            <time datetime="{{ date }}">{{ date }}</time>
            <span class="author">by {{ author }}</span>
        </div>
    </header>
    <div class="post-content">
        {{{ content }}}
    </div>
    {% if tags %}
    <footer class="post-footer">
        <div class="tags">
            <strong>Tags:</strong>
            {% for tag in tag_list %}
            <a href="{{ tag.url }}" class="tag">{{ tag.name }}</a>
            {% endfor %}
        </div>
    </footer>
    {% endif %}
</article>
